components:
  schemas:
    CardTypeEnum:
      enum:
      - uzcard
      - humo
      - visa
      - virtual
      type: string
      description: |-
        * `uzcard` - Uzcard
        * `humo` - Humo
        * `visa` - Visa
        * `virtual` - Virtual
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        icon:
          type: string
          nullable: true
          maxLength: 50
      required:
      - id
      - name
      - slug
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8
      required:
      - new_password
      - old_password
    PatchedTransaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        wallet:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        amount:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        description:
          type: string
        receiver:
          type: integer
          nullable: true
        receiver_wallet:
          type: integer
          nullable: true
        sender_name:
          type: string
          readOnly: true
        sender_phone:
          type: string
          readOnly: true
        receiver_name:
          type: string
          readOnly: true
        receiver_phone:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    PatchedUserUpdate:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 255
        main_currency:
          type: string
          maxLength: 3
        notifications_enabled:
          type: boolean
    PatchedWallet:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        card_type:
          $ref: '#/components/schemas/CardTypeEnum'
        card_number:
          type: string
          writeOnly: true
          nullable: true
          maxLength: 16
        expire_date:
          type: string
          nullable: true
          maxLength: 5
        cvv:
          type: string
          writeOnly: true
          nullable: true
          maxLength: 3
        balance:
          type: integer
          readOnly: true
        currency:
          type: string
          maxLength: 3
        is_default:
          type: boolean
        is_active:
          type: boolean
        masked_number:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
    Transaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        wallet:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        amount:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        description:
          type: string
        receiver:
          type: integer
          nullable: true
        receiver_wallet:
          type: integer
          nullable: true
        sender_name:
          type: string
          readOnly: true
        sender_phone:
          type: string
          readOnly: true
        receiver_name:
          type: string
          readOnly: true
        receiver_phone:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - category_name
      - created_at
      - id
      - receiver_name
      - receiver_phone
      - sender_name
      - sender_phone
      - type
      - wallet
    TypeEnum:
      enum:
      - income
      - expense
      - transfer
      type: string
      description: |-
        * `income` - Income
        * `expense` - Expense
        * `transfer` - Transfer
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        main_currency:
          type: string
          maxLength: 3
        notifications_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - full_name
      - id
      - phone_number
    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 255
        main_currency:
          type: string
          maxLength: 3
        notifications_enabled:
          type: boolean
      required:
      - full_name
    Wallet:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        card_type:
          $ref: '#/components/schemas/CardTypeEnum'
        card_number:
          type: string
          writeOnly: true
          nullable: true
          maxLength: 16
        expire_date:
          type: string
          nullable: true
          maxLength: 5
        cvv:
          type: string
          writeOnly: true
          nullable: true
          maxLength: 3
        balance:
          type: integer
          readOnly: true
        currency:
          type: string
          maxLength: 3
        is_default:
          type: boolean
        is_active:
          type: boolean
        masked_number:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - balance
      - created_at
      - id
      - masked_number
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
