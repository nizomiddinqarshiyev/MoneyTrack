components:
  schemas:
    CardTypeEnum:
      enum:
      - uzcard
      - humo
      - visa
      - virtual
      type: string
      description: |-
        * `uzcard` - Uzcard
        * `humo` - Humo
        * `visa` - Visa
        * `virtual` - Virtual
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        icon:
          type: string
          nullable: true
          maxLength: 50
      required:
      - id
      - name
      - slug
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8
      required:
      - new_password
      - old_password
    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 8
      required:
      - new_password
      - old_password
    FaceEncodingRequest:
      type: object
      properties:
        face_encoding:
          type: array
          items:
            type: number
            format: double
          description: A list of 128 or 512 floats representing the face encoding.
          minItems: 128
      required:
      - face_encoding
    FaceVerificationResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
      required:
      - message
      - status
    Login:
      type: object
      properties:
        phone_number:
          type: string
      required:
      - phone_number
    LoginRequest:
      type: object
      properties:
        phone_number:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - phone_number
    PatchedTransactionRequest:
      type: object
      properties:
        wallet:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        amount:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        category:
          type: integer
          nullable: true
        description:
          type: string
        receiver:
          type: integer
          nullable: true
        receiver_wallet:
          type: integer
          nullable: true
    PatchedUserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        main_currency:
          type: string
          minLength: 1
          maxLength: 3
        notifications_enabled:
          type: boolean
    PatchedWalletRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        card_type:
          $ref: '#/components/schemas/CardTypeEnum'
        card_number:
          type: string
          writeOnly: true
          nullable: true
          maxLength: 16
        expire_date:
          type: string
          nullable: true
          maxLength: 5
        cvv:
          type: string
          writeOnly: true
          nullable: true
          maxLength: 3
        currency:
          type: string
          minLength: 1
          maxLength: 3
        is_default:
          type: boolean
        is_active:
          type: boolean
    Register:
      type: object
      properties:
        phone_number:
          type: string
          pattern: ^\+998\d{9}$
          maxLength: 13
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        full_name:
          type: string
          maxLength: 255
      required:
      - full_name
      - phone_number
    RegisterRequest:
      type: object
      properties:
        phone_number:
          type: string
          minLength: 1
          pattern: ^\+998\d{9}$
          maxLength: 13
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        full_name:
          type: string
          minLength: 1
          maxLength: 255
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - full_name
      - password
      - phone_number
    SendOTPRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
      - email
    TopUpRequest:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,18}(?:\.\d{0,2})?$
      required:
      - amount
    Transaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        wallet:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        amount:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        description:
          type: string
        receiver:
          type: integer
          nullable: true
        receiver_wallet:
          type: integer
          nullable: true
        sender_name:
          type: string
          readOnly: true
        sender_phone:
          type: string
          readOnly: true
        receiver_name:
          type: string
          readOnly: true
        receiver_phone:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - category_name
      - created_at
      - id
      - receiver_name
      - receiver_phone
      - sender_name
      - sender_phone
      - type
      - wallet
    TransactionRequest:
      type: object
      properties:
        wallet:
          type: integer
        type:
          $ref: '#/components/schemas/TypeEnum'
        amount:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        category:
          type: integer
          nullable: true
        description:
          type: string
        receiver:
          type: integer
          nullable: true
        receiver_wallet:
          type: integer
          nullable: true
      required:
      - amount
      - type
      - wallet
    TypeEnum:
      enum:
      - income
      - expense
      - transfer
      type: string
      description: |-
        * `income` - Income
        * `expense` - Expense
        * `transfer` - Transfer
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        main_currency:
          type: string
          maxLength: 3
        notifications_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - full_name
      - id
      - phone_number
    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 255
