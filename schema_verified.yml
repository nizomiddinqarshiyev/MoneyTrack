  /api/v1/transactions/transactions/:
    get:
      operationId: transactions_transactions_list
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: created_at__gte
        schema:
          type: string
          format: date-time
      - in: query
        name: created_at__lte
        schema:
          type: string
          format: date-time
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
          enum:
          - expense
          - income
          - transfer
        description: |-
          * `income` - Income
          * `expense` - Expense
          * `transfer` - Transfer
      tags:
      - transactions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
          description: ''
    post:
      operationId: transactions_transactions_create
      tags:
