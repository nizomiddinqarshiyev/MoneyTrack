openapi: 3.0.3
info:
  title: MoneyTrack API
  version: 1.0.0
  description: Financial tracking and biometric antifraud system API
paths:
  /api/antifraud/register/:
    post:
      operationId: api_antifraud_register_create
      description: |-
        Registers a new face encoding for the user.
        Expects 'face_encoding' as a list of 128/512 floats.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceEncodingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FaceEncodingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FaceEncodingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaceVerificationResponse'
          description: ''
  /api/antifraud/verify/:
    post:
      operationId: api_antifraud_verify_create
      description: Verifies a face encoding against the stored profile.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceEncodingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FaceEncodingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FaceEncodingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaceVerificationResponse'
          description: ''
